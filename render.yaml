services:
  - type: web
    name: telegram-tool
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TG_API_ID
        sync: false
      - key: TG_API_HASH
        sync: false
      - key: TOKEN
        sync: false
      - key: SOURCE_GROUP
        sync: false
      - key: TARGET_GROUP
        sync: false
      - key: DAILY_LIMIT
        value: "35"
